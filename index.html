<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizuki 的小窝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #ffe4e1 0%, #fff9f7 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'Hiragino Sans', 'Microsoft YaHei', sans-serif;
            color: #4a4a4a;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .sakura-icon {
            font-size: 48px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            color: #f8a5a5;
            font-size: 2.5em;
            margin: 20px 0 10px;
        }
        
        .subtitle {
            color: #b5838d;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(248, 165, 165, 0.15);
        }
        
        .section-title {
            color: #b5838d;
            font-size: 1.5em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #fcc9b9;
        }
        
        .posts {
            list-style: none;
        }
        
        .post-item {
            margin-bottom: 20px;
            padding: 15px;
            background: #fff9f7;
            border-radius: 12px;
            transition: all 0.2s;
        }
        
        .post-item:hover {
            background: #ffe4e1;
            transform: translateX(5px);
        }
        
        .post-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .post-title a {
            color: #b5838d;
            text-decoration: none;
        }
        
        .post-title a:hover {
            color: #f8a5a5;
        }
        
        .post-meta {
            color: #6d6875;
            font-size: 0.85em;
        }
        
        .tags {
            margin-top: 8px;
        }
        
        .tag {
            display: inline-block;
            background: #fcc9b9;
            color: #b5838d;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 0.75em;
            margin-right: 8px;
        }
        
        .about {
            line-height: 1.8;
        }
        
        .social-links {
            margin-top: 20px;
        }
        
        .social-links a {
            color: #f8a5a5;
            text-decoration: none;
            margin-right: 15px;
            font-size: 0.9em;
        }
        
        .social-links a:hover {
            color: #b5838d;
        }
        
        .footer {
            text-align: center;
            padding: 30px 0 20px;
            color: #6d6875;
            font-size: 0.9em;
            border-top: 1px solid #fcc9b9;
            margin-top: 40px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="sakura-icon">🌸</div>
            <h1>Mizuki 的小窝</h1>
            <div class="subtitle">记录生活、思考与美好 ✨</div>
        </div>
        
        <div class="card">
            <h2 class="section-title">📝 最新文章</h2>
            <ul class="posts">
                <li class="post-item">
                    <div class="post-title">
                        <a href="/2024/01/15/hello-mizuki.html">🌸 你好，我是 Mizuki</a>
                    </div>
                    <div class="post-meta">2024年1月15日</div>
                    <div class="tags">
                        <span class="tag">自我介绍</span>
                        <span class="tag">博客开篇</span>
                    </div>
                </li>
            </ul>
        </div>
        
        <div class="card">
            <h2 class="section-title">🌸 关于我</h2>
            <div class="about">
                <p>大家好，我是 Mizuki！</p>
                <p>喜欢樱花、抹茶和一切美好的事物 🌸</p>
                <p>希望通过这个博客记录生活中的小确幸，分享学习和成长的点点滴滴。</p>
                <div class="social-links">
                    <a href="https://github.com/limz520" target="_blank">GitHub</a>
                    <a href="mailto:your-email@example.com">Email</a>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>✿ 每天都要开心 ✿</p>
            <p style="font-size: 0.8em; margin-top: 10px;">© 2024 Mizuki</p>
        </div>
    </div>
</body>
</html>
